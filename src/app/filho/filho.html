<div>
  <h3>Componente da Filha</h3>
  <p>exibir o que vem do pai:</p>

  <ul>
    @for (item of listaRecebida; track $index) {
      <div class="alinhar">
        <li><strong>Item:</strong> {{ item }}</li>
        <button (click)="onStart($index)">Start</button>
        <button (click)="onFinish($index)">Finish</button>
      </div>
    } @empty {
      <li>A lista está vazia!</li>
    }
  </ul>
</div>
