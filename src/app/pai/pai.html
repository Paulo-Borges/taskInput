<div>
  <h2>Componente Pai</h2>
  <div class="mover">
    <input type="text" #itemInput />
    <button (click)="adicionarItem(itemInput.value); itemInput.value = ''">Adicionar</button>
  </div>
  <h4>Ver no Pai</h4>

  <ul>
    @for (item of listaDeTarefas; track $index) {
      <li>
        {{ item }}
        <button (click)="removerItem($index)">Remover</button>
      </li>
    } @empty {
      <li>Nenhuma tarefa pendente!</li>
    }
  </ul>

  <hr class="line" />

  <app-filho [listaRecebida]="listaDeTarefas" (removerItem)="removerItem($event)"></app-filho>
  <hr class="line" />
  <app-filho-two [listaRecebida]="listaDeTarefas" />
</div>
