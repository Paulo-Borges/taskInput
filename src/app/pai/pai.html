<div>
  <h2>Componente Pai</h2>
  <div class="mover">
    <input type="text" #itemInput />
    <button (click)="adicionarItem(itemInput.value); itemInput.value = ''">Adicionar</button>

    <!-- @if (tarefaEmAndamento) {
      <h5>{{ tarefaEmAndamento }}</h5>
    } -->
  </div>

  <hr class="line" />

  <app-filho
    [listaRecebida]="listaDeTarefas"
    (removerItem)="removerItem($event)"
    (startTask)="startTask($event)"
  ></app-filho>
  <hr class="line" />
  <app-filho-two [listaRecebida]="listaDeTarefas" [tarefaSendoExecutada]="tarefaEmAndamento" />
</div>
